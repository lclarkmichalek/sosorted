name: Benchmark

on:
  pull_request:
    branches: ['**']

permissions:
  contents: write
  pull-requests: write

jobs:
  hypobench:
    name: Run Benchmarks
    runs-on: [self-hosted, benchmark]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git ref comparison

      - name: Resolve base tip
        id: base
        run: |
          # `github.event.pull_request.base.sha` is the merge-base snapshot at
          # PR divergence, not the current tip of the base branch. Resolve the
          # live tip at workflow runtime so the diff and baseline build reflect
          # the branch as it exists now (robust to unrebased stale PRs).
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          SHA=$(git rev-parse "origin/${BASE_REF}")
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${BASE_REF} tip: ${SHA}"

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-05

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install hypobench
        run: |
          # Pin the CLI to the same version as hypobench-harness in Cargo.toml
          # so the CLI and the in-process harness speak the same protocol.
          # Cargo.lock is gitignored, so generate it first — `cargo pkgid`
          # requires a resolved graph to extract the exact version.
          cargo generate-lockfile --quiet
          VERSION=$(cargo pkgid -p hypobench-harness | sed 's/.*@//')
          echo "Installing hypobench@${VERSION}"
          cargo install "hypobench@${VERSION}"

      - name: Run benchmark comparison (JSON)
        id: benchmarks
        timeout-minutes: 40
        run: |
          set +e  # Don't exit on error — we want to inspect hypobench's exit code below.
          hypobench run \
            --baseline ${{ steps.base.outputs.sha }} \
            --candidate ${{ github.event.pull_request.head.sha }} \
            --config .hypobench.toml \
            --format json \
            > report.json
          EXIT_CODE=$?
          echo "tool_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # 0 = no regressions, 1 = regressions detected — both are "the tool ran successfully".
          # Anything else is a real failure that should fail the step.
          if [ "$EXIT_CODE" -ge 128 ]; then
            exit 1
          fi
          exit 0

      - name: Render terminal report
        run: hypobench report --in report.json --format terminal | tee benchmark-output.txt

      - name: Render PR-comment report
        run: hypobench report --in report.json --format github-pr-comment > benchmark-comment.md

      - name: Upload JSON report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hypobench-report
          path: report.json
          retention-days: 90

      - name: Generate step summary
        run: |
          EXIT_CODE="${{ steps.benchmarks.outputs.tool_exit_code }}"
          echo "## Benchmark Comparison Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$EXIT_CODE" == "1" ]; then
            echo "⚠️ **Regressions detected.**" >> $GITHUB_STEP_SUMMARY
          elif [ "$EXIT_CODE" == "0" ]; then
            echo "✅ **No regressions detected.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Benchmark execution failed** (exit $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: benchmark-comment.md
          edit-mode: replace

      - name: Fail on regressions
        if: steps.benchmarks.outputs.tool_exit_code == '1'
        run: |
          echo "::error::Benchmark regressions detected. See the PR comment for details."
          exit 1
