name: Benchmark

on:
  pull_request:
    branches: ['**']

permissions:
  contents: write
  pull-requests: write

jobs:
  hypobench:
    name: Run Benchmarks
    runs-on: [self-hosted, benchmark]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git ref comparison

      - name: Resolve base tip
        id: base
        run: |
          # `github.event.pull_request.base.sha` is the merge-base snapshot at
          # PR divergence, not the current tip of the base branch. Resolve the
          # live tip at workflow runtime so the diff and baseline build reflect
          # the branch as it exists now (robust to unrebased stale PRs).
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          SHA=$(git rev-parse "origin/${BASE_REF}")
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${BASE_REF} tip: ${SHA}"

      - name: Detect changed files
        id: changes
        run: |
          BASE="${{ steps.base.outputs.sha }}"
          CHANGED=$(git diff --name-only $BASE HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Check if any Rust files changed
          RUST_FILES=$(echo "$CHANGED" | grep '\.rs$' || true)
          if [ -z "$RUST_FILES" ]; then
            echo "skip_benchmarks=true" >> $GITHUB_OUTPUT
            echo "No Rust files changed, skipping benchmarks"
            exit 0
          fi

          echo "skip_benchmarks=false" >> $GITHUB_OUTPUT

      - name: Install nightly toolchain
        if: steps.changes.outputs.skip_benchmarks != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-05

      - name: Install system dependencies
        if: steps.changes.outputs.skip_benchmarks != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install hypobench
        if: steps.changes.outputs.skip_benchmarks != 'true'
        run: cargo install hypobench@0.4.0

      - name: Debug - Build benchmarks manually
        if: steps.changes.outputs.skip_benchmarks != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_on: error
          command: |
            echo "Building HEAD benchmarks..."
            cargo bench --no-run

            echo "Building Baseline benchmarks..."
            git checkout ${{ steps.base.outputs.sha }}
            cargo bench --no-run

            # Restore HEAD
            git checkout ${{ github.event.pull_request.head.sha }}

      - name: Run benchmark comparison
        if: steps.changes.outputs.skip_benchmarks != 'true'
        id: benchmarks
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_on: error
          command: |
            set +e  # Don't exit on error
            hypobench \
              --baseline ${{ steps.base.outputs.sha }} \
              --candidate ${{ github.event.pull_request.head.sha }} \
              --config .hypobench.toml \
              2>&1 | tee benchmark-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            # Use a distinct key here — `nick-fields/retry` declares its own
            # `exit_code` output which last-write-wins overrides ours at the
            # end of the step. `tool_exit_code` avoids the collision.
            echo "tool_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

            # Exit with success for 0 (no regressions) or 1 (regressions detected)
            # Exit with failure for 128+ (errors) to trigger retry
            if [ "$EXIT_CODE" -ge 128 ]; then
              exit 1
            fi
            exit 0

      - name: Generate summary
        if: steps.changes.outputs.skip_benchmarks != 'true'
        run: |
          echo "## Benchmark Comparison Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.benchmarks.outputs.tool_exit_code }}" == "1" ]; then
            echo "⚠️ **Regressions detected!** See details below." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No regressions detected.**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Baseline:** \`${{ steps.base.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Candidate:** \`${{ github.event.pull_request.head.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Sample size:** 50" >> $GITHUB_STEP_SUMMARY
          echo "- **Significance level:** 0.05" >> $GITHUB_STEP_SUMMARY
          echo "- **Effect threshold:** 2.0%" >> $GITHUB_STEP_SUMMARY

      - name: Generate summary (skipped)
        if: steps.changes.outputs.skip_benchmarks == 'true'
        run: |
          echo "## Benchmark Comparison Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **Benchmarks skipped** - no Rust files changed." >> $GITHUB_STEP_SUMMARY

      - name: Determine benchmark status
        if: steps.changes.outputs.skip_benchmarks != 'true'
        id: bench-status
        run: |
          EXIT_CODE="${{ steps.benchmarks.outputs.tool_exit_code }}"
          if [ "$EXIT_CODE" == "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ **No regressions detected.**" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" == "1" ]; then
            echo "status=regression" >> $GITHUB_OUTPUT
            echo "message=⚠️ **Regressions detected!**" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "message=❌ **Benchmark execution failed** (exit code: $EXIT_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: steps.changes.outputs.skip_benchmarks != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Statistical Benchmark Comparison

            ${{ steps.bench-status.outputs.message }}

            ${{ steps.bench-status.outputs.status == 'error' && 'The benchmark tool failed to build or run. This typically indicates:\n- Missing system dependencies\n- Build failures\n- Runtime errors\n\nCheck the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.' || '' }}

            <details>
            <summary>Benchmark Results</summary>

            ```
            ${{ steps.benchmarks.outputs.tool_exit_code != '' && '(see workflow run for full output)' || '' }}
            ```

            </details>

            | Baseline | Candidate |
            |----------|-----------|
            | `${{ steps.base.outputs.sha }}` | `${{ github.event.pull_request.head.sha }}` |

            <details>
            <summary>Statistical Testing Parameters</summary>

            - **Sample size:** 50 iterations per benchmark
            - **Significance level (α):** 0.05
            - **Effect threshold:** ≥2.0% change required
            - **Test:** Welch's t-test (two-tailed)

            </details>

            <sub>Run via hypobench on self-hosted GCP runner with Rust nightly-2026-01-05</sub>
          edit-mode: replace

      - name: Post comment (skipped)
        if: steps.changes.outputs.skip_benchmarks == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Statistical Benchmark Comparison

            ⏭️ **Benchmarks skipped** - no Rust files changed.
          edit-mode: replace

      - name: Fail on regressions
        if: steps.changes.outputs.skip_benchmarks != 'true' && steps.benchmarks.outputs.tool_exit_code == '1'
        run: |
          echo "::error::Benchmark regressions detected. See the benchmark output for details."
          exit 1
